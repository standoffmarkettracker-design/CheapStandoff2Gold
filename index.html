<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheap Standoff 2 Gold — Daily Gold Subscriptions & Instant Packs</title>
<meta name="description" content="Get Standoff 2 gold for a fraction of in-app prices. Daily gold subscriptions from $1/mo and instant gold packs, delivered to your account by the standoff2markettracker.com team.">
<meta property="og:title" content="Cheap Standoff 2 Gold — Subscriptions & Instant Packs">
<meta property="og:description" content="Up to 6,000 gold per month from $25. Instant packs delivered within 24 hours.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0E1A; --bg2:#121629; --bg3:#1A1F38;
  --gold:#FFC93C; --gold-hot:#FFB020; --gold-dim:rgba(255,201,60,.14);
  --ink:#E8EAF2; --muted:#8B90A5; --green:#3DD68C; --danger:#FF5C5C;
  --line:rgba(255,201,60,.16);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,.num{font-family:'Rajdhani',sans-serif;letter-spacing:.02em;line-height:1.1}
img{max-width:100%}
a{color:var(--gold);text-decoration:none}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px}
.eyebrow{font-family:'Rajdhani';font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
.goldtext{background:linear-gradient(100deg,#FFE28A 0%,var(--gold) 45%,#C98F12 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Rajdhani';font-weight:700;font-size:16px;letter-spacing:.06em;text-transform:uppercase;padding:14px 26px;border:none;cursor:pointer;transition:transform .15s,box-shadow .15s,background .15s;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.btn-gold{background:linear-gradient(120deg,#FFE28A,var(--gold) 55%,var(--gold-hot));color:#141000}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,201,60,.35)}
.btn-ghost{background:transparent;color:var(--gold);box-shadow:inset 0 0 0 1.5px var(--gold)}
.btn-ghost:hover{background:var(--gold-dim)}
.btn-sm{padding:10px 18px;font-size:14px}
.btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}
/* announcement */
.annc{background:linear-gradient(90deg,var(--gold-dim),transparent 60%);border-bottom:1px solid var(--line);font-size:13px;padding:8px 0;text-align:center;color:var(--muted)}
.annc b{color:var(--gold)}
/* header */
header{position:sticky;top:0;z-index:50;background:rgba(11,14,26,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px}
.logo{font-family:'Rajdhani';font-weight:700;font-size:22px;color:var(--ink);display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo span{color:var(--gold)}
.navlinks{display:flex;gap:4px;list-style:none}
.navlinks button{background:none;border:none;color:var(--muted);font:inherit;font-size:14px;font-weight:500;padding:8px 12px;cursor:pointer;border-radius:6px}
.navlinks button:hover,.navlinks button.active{color:var(--gold);background:var(--gold-dim)}
.authbox{display:flex;align-items:center;gap:10px}
.uname{color:var(--gold);font-weight:600;font-size:14px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* hero */
.hero{padding:72px 0 56px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(700px 380px at 78% 8%,rgba(255,201,60,.10),transparent 65%);pointer-events:none}
.herogrid{display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:center}
.hero h1{font-size:clamp(38px,5.4vw,60px);font-weight:700;margin:14px 0 18px}
.hero p.lead{color:var(--muted);font-size:18px;max-width:520px;margin-bottom:28px}
.heroctas{display:flex;gap:14px;flex-wrap:wrap}
.trustline{margin-top:26px;font-size:13px;color:var(--muted);display:flex;gap:18px;flex-wrap:wrap}
.trustline b{color:var(--ink)}
/* hero deal card */
.dealcard{background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--line);padding:28px;position:relative;clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px)}
.dealcard .tag{position:absolute;top:0;right:0;background:var(--gold);color:#141000;font-family:'Rajdhani';font-weight:700;font-size:12px;letter-spacing:.14em;padding:5px 14px}
.dealnum{font-size:56px;font-weight:700}
.dealsub{color:var(--muted);font-size:14px;margin:2px 0 18px}
.dealrow{display:flex;justify-content:space-between;padding:10px 0;border-top:1px dashed var(--line);font-size:14px}
.dealrow b{font-family:'Rajdhani';font-size:16px;color:var(--gold)}
/* sections */
section{padding:72px 0}
.sect-head{text-align:center;max-width:640px;margin:0 auto 44px}
.sect-head h2{font-size:clamp(28px,4vw,40px);margin:10px 0 12px}
.sect-head p{color:var(--muted)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
/* cards */
.card{background:var(--bg2);border:1px solid var(--line);padding:26px;position:relative;display:flex;flex-direction:column;transition:transform .18s,border-color .18s}
.card:hover{transform:translateY(-5px);border-color:rgba(255,201,60,.45)}
.card h3{font-size:22px;margin-bottom:4px}
.card .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.price{font-family:'Rajdhani';font-weight:700;font-size:40px;color:var(--gold)}
.price small{font-size:15px;color:var(--muted);font-weight:600}
.was{color:var(--muted);text-decoration:line-through;font-size:14px;margin-left:8px}
.goldamt{font-family:'Rajdhani';font-weight:700;font-size:26px;margin:10px 0 2px}
.feat{list-style:none;margin:14px 0 20px;flex:1}
.feat li{font-size:14px;color:var(--muted);padding:6px 0 6px 24px;position:relative}
.feat li::before{content:"◆";position:absolute;left:2px;color:var(--gold);font-size:10px;top:9px}
.badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--gold);color:#141000;font-family:'Rajdhani';font-weight:700;font-size:12px;letter-spacing:.12em;padding:4px 16px;white-space:nowrap}
.card.best{border-color:var(--gold)}
.card.best::before{content:"";position:absolute;top:0;left:0;right:0;height:8px;background:repeating-linear-gradient(45deg,var(--gold) 0 12px,#141000 12px 24px)}
.permo{font-size:12px;color:var(--green);font-weight:600;margin-top:6px}
/* toggle */
.toggle{display:flex;justify-content:center;gap:0;margin-bottom:36px}
.toggle button{font-family:'Rajdhani';font-weight:700;font-size:15px;letter-spacing:.06em;text-transform:uppercase;padding:11px 26px;background:var(--bg2);color:var(--muted);border:1px solid var(--line);cursor:pointer}
.toggle button.on{background:var(--gold);color:#141000;border-color:var(--gold)}
.toggle .save{font-size:11px;display:block;letter-spacing:.04em}
/* steps */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;counter-reset:step}
.step{background:var(--bg2);border:1px solid var(--line);padding:26px}
.step::before{counter-increment:step;content:"0" counter(step);font-family:'Rajdhani';font-weight:700;font-size:40px;color:var(--gold-dim);-webkit-text-stroke:1px var(--gold);display:block;margin-bottom:8px}
.step h3{font-size:19px;margin-bottom:8px}
.step p{color:var(--muted);font-size:14px}
/* sell */
.sellgrid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px 14px;background:rgba(0,0,0,.35);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:15px;border-radius:4px}
input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,201,60,.15)}
.quote{background:var(--gold-dim);border:1px solid var(--line);padding:16px;font-size:15px;margin-top:6px}
.quote b{color:var(--green);font-family:'Rajdhani';font-size:22px}
/* faq */
details{background:var(--bg2);border:1px solid var(--line);margin-bottom:10px}
summary{cursor:pointer;padding:18px 20px;font-weight:600;font-size:15px;list-style:none;display:flex;justify-content:space-between;align-items:center}
summary::after{content:"+";font-family:'Rajdhani';font-size:22px;color:var(--gold)}
details[open] summary::after{content:"–"}
details p{padding:0 20px 18px;color:var(--muted);font-size:14px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(5,7,15,.8);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--gold);max-width:460px;width:100%;padding:30px;position:relative;clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);max-height:90vh;overflow-y:auto}
.modal h3{font-size:24px;margin-bottom:4px}
.modal .msub{color:var(--muted);font-size:13px;margin-bottom:18px}
.xbtn{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.ordersum{background:var(--gold-dim);border:1px dashed var(--line);padding:12px 14px;font-size:14px;margin-bottom:18px;display:flex;justify-content:space-between}
.ordersum b{color:var(--gold);font-family:'Rajdhani';font-size:17px}
.oksplash{text-align:center;padding:14px 0}
.oksplash .big{font-size:52px}
.alert{padding:12px 14px;font-size:13px;margin-top:12px;border:1px solid}
.alert.err{border-color:var(--danger);color:var(--danger);background:rgba(255,92,92,.08)}
/* dashboard */
.dash{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.statnum{font-family:'Rajdhani';font-weight:700;font-size:44px;color:var(--gold)}
/* footer */
footer{border-top:1px solid var(--line);padding:36px 0;color:var(--muted);font-size:13px}
.fgrid{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:center}
/* sticky mobile cta */
.mcta{display:none;position:fixed;bottom:0;left:0;right:0;z-index:60;padding:10px 14px;background:rgba(11,14,26,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line)}
.mcta .btn{width:100%}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}html{scroll-behavior:auto}}
@media(max-width:900px){
  .herogrid{grid-template-columns:1fr}
  .grid3,.steps,.dash{grid-template-columns:1fr}
  .sellgrid{grid-template-columns:1fr}
  .navlinks{display:none}
  .mcta{display:block}
  body{padding-bottom:64px}
  section{padding:52px 0}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// Firebase config (replaced at deploy with live project config)
const firebaseConfig = {
      apiKey: "AIzaSyDX-FZZVvr2XguDvHZUonJokgTAs9O19CY",
      authDomain: "standoff-2-tracker.firebaseapp.com",
      projectId: "standoff-2-tracker",
      databaseURL: "https://standoff-2-tracker-default-rtdb.firebaseio.com",
      storageBucket: "standoff-2-tracker.firebasestorage.app",
      messagingSenderId: "576315107843",
      appId: "1:576315107843:web:452af4251cfc60fd2b3c36"
    };

// Initialize Firebase (safe: app still renders if config is missing)
let auth, db;
try {
  if (!window.firebase?.apps?.length) {
    window.firebase.initializeApp(firebaseConfig);
  }
  auth = window.firebase.auth();
  db = window.firebase.database();
} catch (e) {
  console.warn('Firebase not configured yet:', e);
  auth = { onAuthStateChanged: (cb) => { cb(null); return () => {}; }, signOut: () => {} };
  const fakeRef = { on: () => {}, off: () => {}, once: () => Promise.resolve({ val: () => null }), push: () => Promise.resolve() };
  db = { ref: () => fakeRef };
}

const WEBHOOK = "https://discord.com/api/webhooks/1521212880614330488/whaIWiT5y7FbVYQ93k0TwHtbPljg5CxdG8vwr8J9s6vbWTturZluUyKhHTNKcL0Ytzj5";

const PACKS = [
  { id:'scout',  name:'Scout Pack',  gold:1000,  bonus:0,    price:7.99,  tag:null,          blurb:'Quick top-up for your next skin.' },
  { id:'raider', name:'Raider Pack', gold:5000,  bonus:0,    price:34.99, tag:'MOST POPULAR', blurb:'The sweet spot for serious loadouts.' },
  { id:'vault',  name:'Vault Pack',  gold:10000, bonus:2000, price:69.99, tag:'+2,000 BONUS', blurb:'Maximum gold, maximum bonus.' },
];

const TIERS = [
  { id:'bronze', name:'Bronze', monthly:150,  mo:1,  yr:10,  tag:null },
  { id:'silver', name:'Silver', monthly:2000, mo:10, yr:100, tag:'MOST POPULAR' },
  { id:'gold',   name:'Gold',   monthly:6000, mo:25, yr:250, tag:'BEST VALUE', best:true },
];

const fmt = n => n.toLocaleString('en-US');

async function submitOrder(order) {
  const lines = Object.entries(order).map(([k,v]) => `**${k}:** ${v}`).join('\n');
  let webhookOk = false;
  try {
    const res = await fetch(WEBHOOK, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ embeds:[{ title:`🛒 New ${order.Type} — CheapStandoff2Gold`, description: lines, color: 16763964, timestamp: new Date().toISOString() }] })
    });
    webhookOk = res.ok;
  } catch(e) { console.warn('webhook failed', e); }
  try { await db.ref('goldOrders').push({ ...order, createdAt: Date.now(), status:'pending' }); } catch(e) { console.warn('db write skipped', e); }
  return webhookOk;
}

function Checkout({ item, user, onClose }) {
  const [sid, setSid] = useState('');
  const [disc, setDisc] = useState('');
  const [state, setState] = useState('form'); // form | sending | done | error
  const submit = async () => {
    if (!sid.trim() || !disc.trim()) return;
    setState('sending');
    const ok = await submitOrder({
      Type: item.type, Item: item.label, Price: '$' + item.price.toFixed(2),
      'Standoff 2 ID': sid.trim(), 'Discord': disc.trim(),
      'Account': user ? (user.email || user.uid) : 'guest'
    });
    setState(ok ? 'done' : 'error');
  };
  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <button className="xbtn" onClick={onClose} aria-label="Close">×</button>
        {state !== 'done' ? (
          <div>
            <h3>Complete your order</h3>
            <p className="msub">We take payment over Discord DM, then deliver straight to your account. You are not charged on this page.</p>
            <div className="ordersum"><span>{item.label}</span><b>${item.price.toFixed(2)}</b></div>
            <div className="field">
              <label>Your Standoff 2 player ID</label>
              <input value={sid} onChange={e=>setSid(e.target.value)} placeholder="e.g. 12345678" />
            </div>
            <div className="field">
              <label>Your Discord username</label>
              <input value={disc} onChange={e=>setDisc(e.target.value)} placeholder="e.g. player#0001 or @player" />
            </div>
            <button className="btn btn-gold" style={{width:'100%'}} disabled={state==='sending' || !sid.trim() || !disc.trim()} onClick={submit}>
              {state==='sending' ? 'Sending…' : 'Place order'}
            </button>
            {state==='error' && <div className="alert err">Order could not be sent. DM <b>camel5961</b> on Discord and we will sort you out directly.</div>}
            <p className="msub" style={{marginTop:14, marginBottom:0}}>Placing an order pings our team instantly. We DM you within hours to take payment and deliver.</p>
          </div>
        ) : (
          <div className="oksplash">
            <div className="big">🥇</div>
            <h3>Order received</h3>
            <p className="msub" style={{marginTop:8}}>Our team just got pinged. Watch for a Discord DM from <b style={{color:'var(--gold)'}}>camel5961</b> to complete payment — your gold ships right after.</p>
            <button className="btn btn-ghost btn-sm" onClick={onClose} style={{marginTop:10}}>Done</button>
          </div>
        )}
      </div>
    </div>
  );
}
function Packs({ buy }) {
  return (
    <section id="packs">
      <div className="wrap">
        <div className="sect-head">
          <div className="eyebrow">Instant Gold Packs</div>
          <h2>Need gold <span className="goldtext">right now?</span></h2>
          <p>One-time packs, delivered to your account within 24 hours of payment. No subscription needed.</p>
        </div>
        <div className="grid3">
          {PACKS.map(p => (
            <div key={p.id} className="card">
              {p.tag && <div className="badge">{p.tag}</div>}
              <h3>{p.name}</h3>
              <div className="sub">{p.blurb}</div>
              <div className="goldamt goldtext">🥇 {fmt(p.gold + p.bonus)} gold</div>
              {p.bonus > 0 && <div className="permo">{fmt(p.gold)} + {fmt(p.bonus)} bonus included</div>}
              <div className="price" style={{marginTop:10}}>${p.price}</div>
              <ul className="feat">
                <li>Delivered within 24 hours</li>
                <li>Hand-delivered by our team</li>
                <li>{Math.round((p.gold+p.bonus)/p.price)} gold per dollar</li>
              </ul>
              <button className="btn btn-gold" onClick={() => buy({ type:'Gold Pack', label:`${p.name} — ${fmt(p.gold+p.bonus)} gold`, price:p.price })}>Buy {p.name}</button>
            </div>
          ))}
        </div>
        <p style={{textAlign:'center',color:'var(--muted)',fontSize:14,marginTop:28}}>
          Want the best gold-per-dollar rate? <a href="#subs">Check out daily subscriptions →</a>
        </p>
      </div>
    </section>
  );
}

function Subs({ buy }) {
  const [yearly, setYearly] = useState(false);
  return (
    <section id="subs" style={{background:'var(--bg2)'}}>
      <div className="wrap">
        <div className="sect-head">
          <div className="eyebrow">Gold Subscriptions</div>
          <h2>Claim gold <span className="goldtext">every single day</span></h2>
          <p>Log in, hit claim, stack gold. Subscriptions deliver the best gold-per-dollar rate we offer.</p>
        </div>
        <div className="toggle" role="tablist">
          <button className={!yearly ? 'on' : ''} onClick={()=>setYearly(false)}>Monthly</button>
          <button className={yearly ? 'on' : ''} onClick={()=>setYearly(true)}>Yearly <span className="save">save 17%</span></button>
        </div>
        <div className="grid3">
          {TIERS.map(t => {
            const price = yearly ? t.yr : t.mo;
            const perMo = yearly ? t.yr/12 : t.mo;
            const moGold = t.monthly;
            const daily = Math.round(moGold / 30);
            return (
              <div key={t.id} className={'card' + (t.best ? ' best' : '')} style={t.best ? {paddingTop:34} : null}>
                {t.tag && <div className="badge">{t.tag}</div>}
                <h3>{t.name}</h3>
                <div className="sub">≈ {fmt(daily)} gold claimable daily</div>
                <div className="price">${price}<small>/{yearly?'yr':'mo'}</small>{yearly && <span className="was">${(t.mo*12).toFixed(2)}</span>}</div>
                {yearly && <div className="permo">≈ ${perMo.toFixed(2)}/mo — rate locked for a year</div>}
                <div className="goldamt goldtext">🥇 {fmt(moGold)} gold / month</div>
                <ul className="feat">
                  <li>{fmt(moGold)} gold per month total</li>
                  <li>≈ {fmt(daily)} gold to claim each day</li>
                  <li>{fmt(Math.round(moGold/perMo))} gold per dollar</li>
                  <li>Cancel anytime — keep claimed gold</li>
                  {t.best && <li>Best gold-per-dollar rate we offer</li>}
                </ul>
                <button className={'btn ' + (t.best ? 'btn-gold' : 'btn-ghost')} onClick={() => buy({ type:'Subscription', label:`${t.name} ${yearly?'Yearly':'Monthly'} — ${fmt(moGold)} gold/month`, price })}>
                  Get {t.name}
                </button>
              </div>
            );
          })}
        </div>
        <p style={{textAlign:'center',color:'var(--muted)',fontSize:13,marginTop:26}}>Launch pricing — lock your rate in before it goes up.</p>
      </div>
    </section>
  );
}

function HowItWorks() {
  return (
    <section id="how">
      <div className="wrap">
        <div className="sect-head">
          <div className="eyebrow">How it works</div>
          <h2>From checkout to gold in <span className="goldtext">3 steps</span></h2>
        </div>
        <div className="steps">
          <div className="step"><h3>Pick your gold</h3><p>Choose an instant pack or a daily subscription and drop your Standoff 2 ID at checkout.</p></div>
          <div className="step"><h3>Pay over Discord</h3><p>Our team DMs you to take payment securely — the same crew that runs standoff2markettracker.com.</p></div>
          <div className="step"><h3>Gold hits your account</h3><p>Packs land within 24 hours. Subscribers claim their gold from the dashboard every day.</p></div>
        </div>
      </div>
    </section>
  );
}

function Sell({ sell }) {

function AuthPanel({ onClose }) {
  const [mode, setMode] = useState('login'); // login | signup
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [displayName, setDisplayName] = useState('');
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(null);
  const [busy, setBusy] = useState(false);

  const handleSignUp = () => {
    setError(null);
    if (!email || !password || !displayName) { setError('Please fill in all fields'); return; }
    if (password.length < 6) { setError('Password must be at least 6 characters'); return; }
    setBusy(true);
    window.firebase.auth().createUserWithEmailAndPassword(email, password)
      .then(cred => cred.user.updateProfile({ displayName })
        .then(() => cred.user.sendEmailVerification())
        .then(() => {
          const uid = cred.user.uid;
          return Promise.all([
            db.ref('users/' + uid + '/name').set(displayName),
            db.ref('users/' + uid + '/email').set(email),
            db.ref('users/' + uid + '/joined').set(Date.now())
          ]).catch(() => {});
        }))
      .then(() => { window.firebase.auth().signOut(); setBusy(false); setSuccess('Account created! Check your email (and spam folder) to verify, then sign in.'); })
      .catch(e => { setBusy(false); setError(e.message); });
  };

  const handleLogin = () => {
    setError(null);
    if (!email || !password) { setError('Please fill in all fields'); return; }
    setBusy(true);
    window.firebase.auth().signInWithEmailAndPassword(email, password)
      .then(cred => {
        if (!cred.user.emailVerified) {
          cred.user.sendEmailVerification().catch(() => {});
          window.firebase.auth().signOut();
          setBusy(false);
          setError('Email not verified yet. We sent a new verification link \u2014 check your inbox and spam folder.');
          return;
        }
        setBusy(false); setSuccess('Signed in!'); setTimeout(onClose, 700);
      })
      .catch(e => { setBusy(false); setError(e.message); });
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <button className="xbtn" onClick={onClose} aria-label="Close">\u00d7</button>
        <h3>{mode === 'signup' ? 'Create your account' : 'Sign in'}</h3>
        <p className="msub">{mode === 'signup' ? 'One free account works across both our sites.' : 'Welcome back \u2014 sign in to claim and track your gold.'}</p>
        <div className="toggle" style={{marginBottom:18}}>
          <button className={mode==='login'?'on':''} onClick={()=>{setMode('login');setError(null);setSuccess(null);}}>Sign in</button>
          <button className={mode==='signup'?'on':''} onClick={()=>{setMode('signup');setError(null);setSuccess(null);}}>Sign up</button>
        </div>
        {mode === 'signup' && (
          <div className="field">
            <label>Display name</label>
            <input value={displayName} onChange={e=>setDisplayName(e.target.value)} placeholder="Your name" />
          </div>
        )}
        <div className="field">
          <label>Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" />
        </div>
        <div className="field">
          <label>Password</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" />
        </div>
        {error && <div className="alert err">{error}</div>}
        {success && <div className="alert" style={{borderColor:'var(--green)',color:'var(--green)',background:'rgba(61,214,140,.08)'}}>{success}</div>}
        <button className="btn btn-gold" style={{width:'100%',marginTop:8}} disabled={busy} onClick={mode==='signup'?handleSignUp:handleLogin}>
          {busy ? 'Working\u2026' : (mode === 'signup' ? 'Create account' : 'Sign in')}
        </button>
        <p className="msub" style={{marginTop:14,marginBottom:0}}>Trouble signing in? DM <b style={{color:'var(--gold)'}}>camel5961</b> on Discord.</p>
      </div>
    </div>
  );
}
