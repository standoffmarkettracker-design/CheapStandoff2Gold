<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Marketplace - Buy & Sell Gold</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
    }
    
    #root {
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
      padding: 20px 0;
      margin-bottom: 40px;
    }

    header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }

    h1 {
      font-size: 28px;
      color: #ffd700;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
    }

    .nav-links button {
      background: none;
      border: none;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 16px;
      transition: color 0.3s;
      padding: 8px 12px;
      border-radius: 4px;
    }

    .nav-links button:hover {
      color: #ffd700;
      background: rgba(255, 215, 0, 0.1);
    }

    .nav-links button.active {
      color: #ffd700;
      border-bottom: 2px solid #ffd700;
    }

    .auth-section {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffd700, #ffed4e);
      color: #000;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 215, 0, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 215, 0, 0.1);
      color: #ffd700;
      border: 1px solid #ffd700;
    }

    .btn-secondary:hover {
      background: rgba(255, 215, 0, 0.2);
    }

    .btn-danger {
      background: rgba(255, 100, 100, 0.2);
      color: #ff6464;
      border: 1px solid #ff6464;
    }

    .btn-danger:hover {
      background: rgba(255, 100, 100, 0.3);
    }

    .page-content {
      min-height: calc(100vh - 200px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 215, 0, 0.1);
      border-radius: 12px;
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 215, 0, 0.3);
      transform: translateY(-4px);
    }

    .card h2 {
      color: #ffd700;
      margin-bottom: 12px;
      font-size: 20px;
    }

    .card p {
      color: #b0b0b0;
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .price-tag {
      font-size: 28px;
      color: #ffd700;
      font-weight: 700;
      margin: 16px 0;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin: 16px 0;
      padding: 12px 0;
      border-top: 1px solid rgba(255, 215, 0, 0.1);
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 20px;
      color: #ffd700;
      font-weight: 700;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #b0b0b0;
      font-weight: 500;
      font-size: 13px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 215, 0, 0.1);
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
    }

    .alert {
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .alert-info {
      background: rgba(52, 152, 219, 0.1);
      border: 1px solid rgba(52, 152, 219, 0.3);
      color: #3498db;
    }

    .alert-success {
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid rgba(46, 204, 113, 0.3);
      color: #2ecc71;
    }

    .alert-error {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #ffd700;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 215, 0, 0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255, 215, 0, 0.2);
      padding: 20px;
      text-align: center;
      color: #888;
      margin-top: 60px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js"></script>
  <script src="https://js.stripe.com/v3/"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Firebase config - replace with your credentials
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      databaseURL: "YOUR_DATABASE_URL",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    if (!window.firebase?.apps?.length) {
      window.firebase.initializeApp(firebaseConfig);
    }

    const auth = window.firebase.auth();
    const db = window.firebase.database();

    // ============ PAGES ============

    function HomePage() {
      return (
        <div className="container page-content">
          <h2 style={{ fontSize: '32px', marginBottom: '30px', color: '#ffd700' }}>
            Welcome to Gold Marketplace
          </h2>
          
          <div className="grid">
            <div className="card">
              <h3 style={{ color: '#ffd700', fontSize: '24px', marginBottom: '12px' }}>💰 Buy Gold</h3>
              <p>Subscribe to a tier and claim daily gold allowances. The more you subscribe, the more gold you earn every day.</p>
              <button className="btn btn-primary" style={{ marginTop: '16px', width: '100%' }}>
                View Subscriptions
              </button>
            </div>

            <div className="card">
              <h3 style={{ color: '#ffd700', fontSize: '24px', marginBottom: '12px' }}>💸 Sell Gold</h3>
              <p>Have extra gold? Sell it back to the site at competitive rates. We buy at tiered prices based on quantity.</p>
              <button className="btn btn-primary" style={{ marginTop: '16px', width: '100%' }}>
                Sell Gold
              </button>
            </div>

            <div className="card">
              <h3 style={{ color: '#ffd700', fontSize: '24px', marginBottom: '12px' }}>📊 Dashboard</h3>
              <p>Track your balance, subscriptions, and transaction history all in one place.</p>
              <button className="btn btn-primary" style={{ marginTop: '16px', width: '100%' }}>
                View Dashboard
              </button>
            </div>
          </div>
        </div>
      );
    }

    function SubscriptionsPage() {
      const [tiers, setTiers] = useState([
        {
          id: 'bronze',
          name: 'Bronze',
          monthlyPrice: 2.99,
          yearlyPrice: 29.99,
          dailyAllowance: 100,
          description: 'Great for casual players'
        },
        {
          id: 'silver',
          name: 'Silver',
          monthlyPrice: 9.99,
          yearlyPrice: 99.99,
          dailyAllowance: 300,
          description: 'Perfect for regular players'
        },
        {
          id: 'gold',
          name: 'Gold',
          monthlyPrice: 19.99,
          yearlyPrice: 199.99,
          dailyAllowance: 1000,
          description: 'For serious collectors'
        }
      ]);

      const [billingCycle, setBillingCycle] = useState('monthly');

      return (
        <div className="container page-content">
          <h2 style={{ fontSize: '32px', marginBottom: '30px', color: '#ffd700' }}>
            Subscription Tiers
          </h2>

          <div style={{ marginBottom: '30px', textAlign: 'center' }}>
            <button 
              className={`btn ${billingCycle === 'monthly' ? 'btn-primary' : 'btn-secondary'}`}
              onClick={() => setBillingCycle('monthly')}
              style={{ marginRight: '12px' }}
            >
              Monthly
            </button>
            <button 
              className={`btn ${billingCycle === 'yearly' ? 'btn-primary' : 'btn-secondary'}`}
              onClick={() => setBillingCycle('yearly')}
            >
              Yearly (Save 17%)
            </button>
          </div>

          <div className="grid">
            {tiers.map(tier => (
              <div key={tier.id} className="card">
                <h2>{tier.name}</h2>
                <p>{tier.description}</p>
                
                <div className="price-tag">
                  ${billingCycle === 'monthly' ? tier.monthlyPrice : tier.yearlyPrice}
                  <span style={{ fontSize: '14px', color: '#b0b0b0', marginLeft: '8px' }}>
                    / {billingCycle === 'monthly' ? 'month' : 'year'}
                  </span>
                </div>

                <div className="stats">
                  <div className="stat">
                    <div className="stat-label">Daily</div>
                    <div className="stat-value">{tier.dailyAllowance}</div>
                  </div>
                  <div className="stat">
                    <div className="stat-label">Monthly</div>
                    <div className="stat-value">{(tier.dailyAllowance * 30).toLocaleString()}</div>
                  </div>
                </div>

                <button className="btn btn-primary" style={{ width: '100%' }}>
                  Subscribe Now
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SellGoldPage() {
      const [amount, setAmount] = useState('');
      const [selectedTier, setSelectedTier] = useState('standard');
      const [quote, setQuote] = useState(null);

      const tiers = [
        { id: 'standard', name: 'Standard (0-10k)', pricePerGold: 0.03 },
        { id: 'bulk', name: 'Bulk (10k+)', pricePerGold: 0.05 }
      ];

      const handleGetQuote = () => {
        const tier = tiers.find(t => t.id === selectedTier);
        const numAmount = parseFloat(amount);
        if (numAmount && tier) {
          setQuote({
            gold: numAmount,
            pricePerGold: tier.pricePerGold,
            total: (numAmount * tier.pricePerGold).toFixed(2)
          });
        }
      };

      return (
        <div className="container page-content">
          <h2 style={{ fontSize: '32px', marginBottom: '30px', color: '#ffd700' }}>
            Sell Gold
          </h2>

          <div className="grid">
            <div className="card" style={{ gridColumn: '1 / -1' }}>
              <h2>Sell Your Gold</h2>
              
              <div className="input-group">
                <label>Your Current Balance</label>
                <div style={{ 
                  background: 'rgba(0, 0, 0, 0.3)', 
                  padding: '16px', 
                  borderRadius: '6px',
                  color: '#ffd700',
                  fontSize: '20px',
                  fontWeight: 'bold'
                }}>
                  5,000 Gold
                </div>
              </div>

              <div className="input-group">
                <label>Price Tier</label>
                <select value={selectedTier} onChange={(e) => setSelectedTier(e.target.value)}>
                  {tiers.map(t => (
                    <option key={t.id} value={t.id}>
                      {t.name} - ${t.pricePerGold}/gold
                    </option>
                  ))}
                </select>
              </div>

              <div className="input-group">
                <label>Amount to Sell</label>
                <input 
                  type="number" 
                  placeholder="Enter amount"
                  value={amount}
                  onChange={(e) => setAmount(e.target.value)}
                />
              </div>

              <button className="btn btn-primary" onClick={handleGetQuote} style={{ marginRight: '12px' }}>
                Get Quote
              </button>

              {quote && (
                <div className="alert alert-info" style={{ marginTop: '20px' }}>
                  <strong>Quote:</strong> {quote.gold} gold × ${quote.pricePerGold} = <strong style={{ color: '#2ecc71' }}>${quote.total}</strong>
                </div>
              )}

              {quote && (
                <button className="btn btn-primary" style={{ width: '100%', marginTop: '12px' }}>
                  Confirm Sale
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function DashboardPage() {
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState(null);
      const [transactions, setTransactions] = useState([]);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(user => {
          setUser(user);
          if (user) {
            // Load user data from Firebase
            db.ref(`users/${user.uid}`).on('value', snapshot => {
              setUserData(snapshot.val());
            });
            // Load transactions
            db.ref(`transactions`).orderByChild('uid').equalTo(user.uid).limitToLast(10).on('value', snapshot => {
              const txns = [];
              snapshot.forEach(child => {
                txns.unshift(child.val());
              });
              setTransactions(txns);
            });
          }
        });
        return () => unsubscribe();
      }, []);

      if (!user) {
        return (
          <div className="container page-content">
            <div className="alert alert-info">
              Please log in to view your dashboard.
            </div>
          </div>
        );
      }

      return (
        <div className="container page-content">
          <h2 style={{ fontSize: '32px', marginBottom: '30px', color: '#ffd700' }}>
            My Dashboard
          </h2>

          <div className="grid">
            <div className="card">
              <h2>Gold Balance</h2>
              <div className="price-tag" style={{ margin: '20px 0' }}>
                {userData?.goldBalance || 0}
              </div>
              <button className="btn btn-primary" style={{ width: '100%' }}>
                Claim Daily Gold
              </button>
            </div>

            <div className="card">
              <h2>Subscription</h2>
              <p style={{ fontSize: '18px', color: '#ffd700', marginBottom: '12px' }}>
                {userData?.subscriptionTier || 'None'}
              </p>
              <p style={{ color: '#888', fontSize: '12px', marginBottom: '16px' }}>
                {userData?.subscriptionExpiry ? `Expires: ${new Date(userData.subscriptionExpiry).toLocaleDateString()}` : 'Not subscribed'}
              </p>
              <button className="btn btn-primary" style={{ width: '100%' }}>
                Manage Subscription
              </button>
            </div>

            <div className="card">
              <h2>Transactions</h2>
              <p style={{ color: '#888', fontSize: '12px' }}>
                {transactions.length} recent transactions
              </p>
              <button className="btn btn-secondary" style={{ width: '100%', marginTop: '16px' }}>
                View All
              </button>
            </div>
          </div>

          <div style={{ marginTop: '40px' }}>
            <h3 style={{ color: '#ffd700', marginBottom: '16px' }}>Recent Transactions</h3>
            <div className="card">
              {transactions.length === 0 ? (
                <p style={{ color: '#888' }}>No transactions yet.</p>
              ) : (
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ borderBottom: '1px solid rgba(255, 215, 0, 0.1)' }}>
                      <th style={{ textAlign: 'left', padding: '12px 0', color: '#ffd700' }}>Type</th>
                      <th style={{ textAlign: 'left', padding: '12px 0', color: '#ffd700' }}>Amount</th>
                      <th style={{ textAlign: 'left', padding: '12px 0', color: '#ffd700' }}>Date</th>
                    </tr>
                  </thead>
                  <tbody>
                    {transactions.map((tx, i) => (
                      <tr key={i} style={{ borderBottom: '1px solid rgba(255, 215, 0, 0.05)' }}>
                        <td style={{ padding: '12px 0', color: '#b0b0b0' }}>{tx.type}</td>
                        <td style={{ padding: '12px 0', color: '#ffd700', fontWeight: 'bold' }}>
                          {tx.type === 'sell' ? '-' : '+'}{tx.amount}
                        </td>
                        <td style={{ padding: '12px 0', color: '#888' }}>
                          {new Date(tx.timestamp).toLocaleDateString()}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      );
    }

    function AdminPanel() {
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(user => {
          setUser(user);
          if (user) {
            // Check if user is admin
            db.ref(`admins/${user.uid}`).once('value', snapshot => {
              setIsAdmin(!!snapshot.val());
            });
          }
        });
        return () => unsubscribe();
      }, []);

      if (!isAdmin) {
        return (
          <div className="container page-content">
            <div className="alert alert-error">
              You don't have permission to access the admin panel.
            </div>
          </div>
        );
      }

      return (
        <div className="container page-content">
          <h2 style={{ fontSize: '32px', marginBottom: '30px', color: '#ffd700' }}>
            Admin Panel
          </h2>

          <div className="grid">
            <div className="card" style={{ gridColumn: '1 / -1' }}>
              <h2>Manage Subscription Tiers</h2>
              <p style={{ marginBottom: '20px', color: '#888' }}>Coming soon - Configure subscription tiers, prices, and daily allowances.</p>
            </div>

            <div className="card" style={{ gridColumn: '1 / -1' }}>
              <h2>Manage Sell Prices</h2>
              <p style={{ marginBottom: '20px', color: '#888' }}>Coming soon - Set buy-back prices for different gold tiers.</p>
            </div>

            <div className="card" style={{ gridColumn: '1 / -1' }}>
              <h2>User Management</h2>
              <p style={{ marginBottom: '20px', color: '#888' }}>Coming soon - View and manage user balances, gift gold, etc.</p>
            </div>
          </div>
        </div>
      );
    }

    // ============ MAIN APP ============

    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [user, setUser] = useState(null);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      const handleLogin = () => {
        const provider = new window.firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
      };

      const handleLogout = () => {
        auth.signOut();
      };

      const renderPage = () => {
        switch (currentPage) {
          case 'home': return <HomePage />;
          case 'subscriptions': return <SubscriptionsPage />;
          case 'sell': return <SellGoldPage />;
          case 'dashboard': return <DashboardPage />;
          case 'admin': return <AdminPanel />;
          default: return <HomePage />;
        }
      };

      return (
        <>
          <header>
            <div className="container">
              <h1 onClick={() => setCurrentPage('home')} style={{ cursor: 'pointer' }}>
                🏆 Gold Marketplace
              </h1>
              <div style={{ display: 'flex', gap: '30px', alignItems: 'center' }}>
                <ul className="nav-links">
                  <li><button className={currentPage === 'home' ? 'active' : ''} onClick={() => setCurrentPage('home')}>Home</button></li>
                  <li><button className={currentPage === 'subscriptions' ? 'active' : ''} onClick={() => setCurrentPage('subscriptions')}>Subscriptions</button></li>
                  <li><button className={currentPage === 'sell' ? 'active' : ''} onClick={() => setCurrentPage('sell')}>Sell Gold</button></li>
                  {user && <li><button className={currentPage === 'dashboard' ? 'active' : ''} onClick={() => setCurrentPage('dashboard')}>Dashboard</button></li>}
                </ul>
                <div className="auth-section">
                  {user ? (
                    <>
                      <span style={{ color: '#ffd700', fontWeight: '500' }}>{user.displayName || 'User'}</span>
                      <button className="btn btn-danger" onClick={handleLogout}>Logout</button>
                    </>
                  ) : (
                    <button className="btn btn-primary" onClick={handleLogin}>Login with Discord</button>
                  )}
                </div>
              </div>
            </div>
          </header>

          <main className="page-content">
            {renderPage()}
          </main>

          <footer>
            <p>&copy; 2024 Gold Marketplace. All rights reserved.</p>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
